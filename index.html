<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Embedded Systems Skill Tree</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-page: #f5f5f5;
            --paper: #ffffff;
            --ink: #000000;
            --fill-color: #61dafb;
            --hex-w: 130px;
            --hex-h: 150px;
            --border-width: 3px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-page);
            display: flex;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .zoom-wrapper {
            width: 100%;
            max-width: 1400px;
            display: flex;
            justify-content: center;
            overflow-x: auto;
            padding-bottom: 20px;
        }

        .poster {
            background-color: var(--paper);
            border: 4px solid var(--ink);
            padding: 40px;
            position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 1150px; 
            min-width: 1150px;
        }

        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 4rem; text-transform: uppercase; font-weight: 900; color: var(--ink); margin-bottom: 10px; }
        .header-sub { display: inline-block; background: var(--ink); color: var(--paper); padding: 5px 15px; font-size: 1.5rem; font-weight: bold; }

        .grid-container { position: relative; width: 1000px; height: 1550px; margin-left: 80px; }
        .hex-wrap { position: absolute; width: var(--hex-w); height: var(--hex-h); clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); background: var(--ink); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.1s ease; }
        .hex-inner { width: calc(var(--hex-w) - (var(--border-width) * 2)); height: calc(var(--hex-h) - (var(--border-width) * 2)); clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); background: var(--paper); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 5px; text-align: center; transition: background 0.2s; }
        .hex-wrap:hover { transform: scale(1.05); z-index: 10; }
        .hex-wrap.completed .hex-inner { background: var(--fill-color); }
        .hex-text { font-size: 0.65rem; font-weight: 700; line-height: 1.1; color: var(--ink); pointer-events: none; margin-bottom: 5px; }

        .footer { margin-top: 50px; display: flex; justify-content: space-between; align-items: flex-end; border-top: 2px solid var(--ink); padding-top: 15px; }
        #username { border: none; border-bottom: 2px solid var(--ink); background: transparent; font-size: 1.2rem; font-weight: bold; margin-left: 10px; width: 250px; outline: none; }
        .sync-panel { background: #f0f0f0; border: 2px solid #ccc; padding: 8px 15px; border-radius: 5px; font-size: 0.9rem; font-weight: bold; display: flex; align-items: center; gap: 10px; }
        #syncIdInput { width: 70px; font-weight: bold; text-align: center; border: 1px solid #aaa; border-radius: 3px; padding: 3px; }
        #syncBtn { background: var(--ink); color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="zoom-wrapper">
        <div class="poster">
            <div class="header"><h1>Embedded Systems</h1><div class="header-sub">Skill Tree</div></div>
            <div class="grid-container" id="grid"></div>
            <div class="footer">
                <div class="footer-left">
                    <div>Name: <input type="text" id="username" placeholder="Type here..."></div>
                    <div class="sync-panel">
                        <span id="connectionStatus">Syncing...</span>
                        Sync ID: <input type="text" id="syncIdInput" maxlength="6">
                        <button id="syncBtn">Load</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Your Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCoRF9ocNSBioKic-I2DJ7aEtPssDg0E7w",
            authDomain: "embeddedskilltree.firebaseapp.com",
            projectId: "embeddedskilltree",
            storageBucket: "embeddedskilltree.firebasestorage.app",
            messagingSenderId: "882992766556",
            appId: "1:882992766556:web:2cd846309e8af0a3f35099"
        };

        const fbApp = initializeApp(firebaseConfig);
        const auth = getAuth(fbApp);
        const db = getFirestore(fbApp);
        const appId = "embeddedskilltree";

        const hexMap = [
            { c: 0, r: 1, text: "Trace debugging" },
            { c: 3, r: 9, text: "Get an Arduino" }
        ];

        const grid = document.getElementById('grid');
        const usernameInput = document.getElementById('username');
        const syncIdInput = document.getElementById('syncIdInput');
        let appData = { progress: {}, username: '' };
        let hexElements = {};

        const urlParams = new URLSearchParams(window.location.search);
        let currentSyncId = urlParams.get('syncId') || Math.random().toString(36).substring(2, 8).toUpperCase();
        syncIdInput.value = currentSyncId;

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                await signInAnonymously(auth);
                return;
            }
            const syncDocRef = doc(db, 'skilltrees', currentSyncId);
            onSnapshot(syncDocRef, (s) => {
                appData = s.exists() ? s.data() : { progress: {}, username: '' };
                usernameInput.value = appData.username || '';
                Object.keys(hexElements).forEach(id => {
                    hexElements[id].className = 'hex-wrap' + (appData.progress[id] ? ' completed' : '');
                });
            });
        });

        hexMap.forEach((item) => {
            const hexWrap = document.createElement('div');
            hexWrap.className = 'hex-wrap';
            const id = `hex_${item.c}_${item.r}`;
            hexElements[id] = hexWrap;
            hexWrap.style.left = `${item.c * 97.5}px`;
            hexWrap.style.top = `${item.r * 150 + (item.c % 2 === 0 ? 75 : 0)}px`;
            hexWrap.innerHTML = `<div class="hex-inner"><div class="hex-text">${item.text}</div></div>`;
            hexWrap.onclick = () => {
                appData.progress[id] = !appData.progress[id];
                hexWrap.className = 'hex-wrap' + (appData.progress[id] ? ' completed' : '');
                setDoc(doc(db, 'skilltrees', currentSyncId), appData, { merge: true }).catch(console.error);
            };
            grid.appendChild(hexWrap);
        });
    </script>
</body>
</html>
